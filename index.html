<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Appunti Angular</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Appunti di studio su Angular — Modern Angular (2ª ed., Angular 22)">
  <meta name="theme-color" content="#dd0031">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div id="app">Caricamento…</div>
  <script>
    // Risolve i link Obsidian [[nome]] / [[nome|alias]] in link Docsify (a render-time, i file .md non vengono toccati).
    // [[NN-...]] -> /capitoli/ ; 00-index -> /00-index.md ; resto -> /concetti/
    function wikilinkPlugin(hook) {
      hook.beforeEach(function (content) {
        // rimuove il frontmatter YAML (--- ... ---) così non viene stampato come testo
        content = content.replace(/^\s*---\n[\s\S]*?\n---\n/, '');
        // converte i wikilink
        return content.replace(/\[\[([^\]|]+?)(?:\|([^\]]+?))?\]\]/g, function (_, target, label) {
          target = target.trim();
          var text = (label || target).trim();
          var path;
          if (/^\d{2}-/.test(target)) path = '/capitoli/' + target + '.md';
          else if (target === '00-index') path = '/00-index.md';
          else path = '/concetti/' + target + '.md';
          return '[' + text + '](' + path + ')';
        });
      });
    }

    // Renderizza i diagrammi mermaid dopo ogni cambio pagina
    function mermaidPlugin(hook) {
      hook.doneEach(function () {
        if (!window.mermaid) return;
        if (!window.__mermaidInit) {
          var darkNow = document.documentElement.classList.contains('dark');
          mermaid.initialize({ startOnLoad: false, theme: darkNow ? 'dark' : 'neutral' });
          window.__mermaidInit = true;
        }
        try { mermaid.run({ querySelector: '.markdown-section .mermaid' }); } catch (e) { /* già renderizzati */ }
      });
    }

    // Rende collassabili i callout "Risposta" (Obsidian [!success]- / [!success]+) anche sul sito.
    // Il contenuto .md resta invariato: lavoriamo solo sul DOM renderizzato da flexible-alerts.
    function collapsibleAnswersPlugin(hook) {
      hook.doneEach(function () {
        var callouts = document.querySelectorAll('.markdown-section .alert.callout-answer');
        callouts.forEach(function (el) {
          if (el.dataset.collapsibleReady) return;
          var heading = el.querySelector('p:first-child, .alert-heading, strong');
          if (!heading) return;
          // Obsidian usa il suffisso -/+ subito dopo il tipo: [!success]-  -> collassato di default
          var raw = (heading.textContent || '').trim();
          var startsCollapsed = true; // default per le risposte: nascoste
          if (/^[-+]/.test(raw)) {
            startsCollapsed = raw.charAt(0) === '-';
            heading.textContent = raw.replace(/^[-+]\s*/, '');
          }
          el.classList.add('is-collapsible');
          el.dataset.collapsibleReady = '1';
          // tutto ciò che segue l'heading è il corpo della risposta
          var body = [];
          var n = heading.nextSibling;
          while (n) { body.push(n); n = n.nextSibling; }
          var wrap = document.createElement('div');
          wrap.className = 'answer-body';
          body.forEach(function (node) { wrap.appendChild(node); });
          el.appendChild(wrap);
          heading.classList.add('answer-toggle');
          heading.setAttribute('role', 'button');
          heading.setAttribute('tabindex', '0');
          function setState(open) {
            el.classList.toggle('open', open);
            heading.setAttribute('aria-expanded', open ? 'true' : 'false');
          }
          setState(!startsCollapsed);
          heading.addEventListener('click', function () { setState(!el.classList.contains('open')); });
          heading.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setState(!el.classList.contains('open')); }
          });
        });
      });
    }

    // Toggle tema chiaro/scuro, persistito in localStorage (key: ng-doc-theme).
    function themeTogglePlugin(hook) {
      hook.mounted(function () {
        var KEY = 'ng-doc-theme';
        var btn = document.createElement('button');
        btn.id = 'theme-toggle';
        btn.type = 'button';
        btn.setAttribute('aria-label', 'Cambia tema chiaro/scuro');
        var saved = localStorage.getItem(KEY);
        var dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        function apply() {
          document.documentElement.classList.toggle('dark', dark);
          btn.textContent = dark ? '☀' : '☾';
          btn.title = dark ? 'Passa al tema chiaro' : 'Passa al tema scuro';
          if (window.mermaid && window.__mermaidInit) {
            // re-init mermaid theme on toggle; i diagrammi già a video restano, i nuovi seguono il tema
            mermaid.initialize({ startOnLoad: false, theme: dark ? 'dark' : 'neutral' });
          }
        }
        apply();
        btn.addEventListener('click', function () {
          dark = !dark;
          localStorage.setItem(KEY, dark ? 'dark' : 'light');
          apply();
        });
        document.body.appendChild(btn);
      });
    }
    // Imposta il tema il prima possibile per evitare il flash (prima ancora di docsify).
    (function () {
      try {
        var saved = localStorage.getItem('ng-doc-theme');
        var dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.classList.toggle('dark', dark);
      } catch (e) {}
    })();

    window.$docsify = {
      name: 'Appunti Angular',
      loadSidebar: true,
      coverpage: true,
      onlyCover: false,
      subMaxLevel: 2,
      relativePath: true,
      auto2top: true,
      // un solo _sidebar.md (root) anche nelle sottocartelle capitoli/ e concetti/
      alias: {
        '/capitoli/_sidebar.md': '/_sidebar.md',
        '/concetti/_sidebar.md': '/_sidebar.md',
        '/_meta/_sidebar.md': '/_sidebar.md',
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      // i blocchi ```mermaid diventano <div class="mermaid">, gli altri mantengono l'highlight Prism
      markdown: {
        renderer: {
          code: function (code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },
      // callout Obsidian: [!info] [!tip] [!warning] [!note] [!success]  (corpo markdown preservato)
      'flexible-alerts': {
        style: 'callout',
        note:    { label: 'Nota' },
        tip:     { label: 'Suggerimento' },
        warning: { label: 'Attenzione' },
        info:    { label: 'Info', className: 'note', icon: 'icon-note' },
        success: { label: 'Risposta', className: 'callout-answer', icon: 'icon-success' }
      },
      pagination: {
        previousText: 'Precedente',
        nextText: 'Successivo',
        crossChapter: true,
        crossChapterText: true
      },
      search: { placeholder: 'Cerca…', noData: 'Nessun risultato', depth: 4 },
      copyCode: { buttonText: 'Copia', successText: 'Copiato' },
      plugins: [wikilinkPlugin, mermaidPlugin, collapsibleAnswersPlugin, themeTogglePlugin]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-plugin-flexible-alerts"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markup.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
</body>
</html>
